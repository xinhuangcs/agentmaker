site_name: agentmaker
site_description: A general-purpose framework for building LLM agents, with tools, skills, memory, RAG, context engineering, guardrails, HITL, and observability.
site_url: https://xinhuangcs.github.io/agentmaker/
repo_url: https://github.com/xinhuangcs/agentmaker
repo_name: xinhuangcs/agentmaker

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Outfit
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    # navigation.instant triggers a static-i18n warning about the language switcher:
    # instant page swaps do not re-render the header, so docs/js/extra.js recomputes
    # the language toggle's href after every swap (and the toggle itself opts out of
    # instant loading via target=_self). Safe to keep both.
    - navigation.instant
    - navigation.instant.progress
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight
  # Dark-first palette, brand colors defined in stylesheets/extra.css (from site/design-tokens.md)
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

plugins:
  - search
  # Bilingual build: docs/en/ at the root, docs/zh/ under /zh/, with per-page language
  # switching and English fallback for pages that have no translation yet.
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          site_description: 通用的 LLM Agent 开发框架：工具、技能、记忆、RAG、上下文工程、护栏、人在回路与可观测性。
          theme:
            language: zh
          nav_translations:
            Home: 首页
            Installation: 安装
            Guides: 指南
            Quickstart: 快速开始
            LLM clients & providers: LLM 客户端与厂商
            Agents & workflows: Agent 与工作流
            Tools: 工具
            Structured output: 结构化输出
            Memory: 记忆
            Retrieval & RAG: 检索与 RAG
            Context engineering: 上下文工程
            Guardrails & human-in-the-loop: 护栏与人在回路
            Observability: 可观测性
            Prompt registry: 提示词注册表
            Skills: 技能
            Scope & async: Scope 与异步
            Testing: 测试
            API Reference: API 参考
            Core: 核心
            Agents: Agent
            Retrieval: 检索
            Context: 上下文
            Runtime: 运行时
            Prompts: 提示词
            Config: 配置
  # Explicit autorefs config: with the bilingual build every API symbol gets an anchor
  # in both /reference/ and /zh/reference/; resolve_closest picks the same-language one.
  - autorefs:
      resolve_closest: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]        # src-layout: import agentmaker from src/ for the API reference
          options:
            show_source: false
            members_order: source
            merge_init_into_class: true
            docstring_options:
              ignore_init_summary: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            line_length: 76
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_heading: true
            filters: ["!^_"]
            # No docstring_style declared: this project's docstrings use Google-style
            # English sections (Args:/Returns:/Raises:), rendered by the default parser.

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
      # Unicode-aware anchor slugs so Chinese headings get real, stable ids
      # (the default slugify strips non-ASCII, which would break every #中文 link).
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js



nav:
  - Home: index.md
  - Installation: installation.md
  - Guides:
      - Quickstart: guides/quickstart.md
      - LLM clients & providers: guides/llm-clients.md
      - Agents & workflows: guides/agents.md
      - Tools: guides/tools.md
      - Structured output: guides/structured-output.md
      - Memory: guides/memory.md
      - Retrieval & RAG: guides/retrieval-and-rag.md
      - Context engineering: guides/context-engineering.md
      - Guardrails & human-in-the-loop: guides/guardrails-and-hitl.md
      - Observability: guides/observability.md
      - Prompt registry: guides/prompts.md
      - Skills: guides/skills.md
      - Scope & async: guides/scope-and-async.md
      - Testing: guides/testing.md
  - API Reference:
      - Core: reference/core.md
      - Agents: reference/agents.md
      - Tools: reference/tools.md
      - Retrieval: reference/retrieval.md
      - Memory: reference/memory.md
      - RAG: reference/rag.md
      - Context: reference/context.md
      - Runtime: reference/runtime.md
      - Skills: reference/skills.md
      - Prompts: reference/prompts.md
      - Config: reference/config.md
      - Testing: reference/testing.md
