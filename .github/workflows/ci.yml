name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0    # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9    # v9.0.0
      - run: uv sync --locked --python ${{ matrix.python }}
      - run: uv run --locked --python ${{ matrix.python }} pytest

  import-extras:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0    # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9    # v9.0.0
      - run: uv sync --locked --all-extras
      - run: uv run --locked --all-extras python scripts/check_imports.py
      - run: uvx pyright@1.1.407 --pythonpath .venv/bin/python src/agentmaker
      - run: uv run --locked --all-extras pytest

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0    # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9    # v9.0.0
      - run: uv sync --locked --group docs
      - name: Build docs and reject unexpected warnings
        shell: bash
        run: |
          set -o pipefail
          log="$(mktemp)"
          trap 'rm -f "$log"' EXIT
          uv run --locked --group docs mkdocs build 2>&1 | tee "$log"
          unexpected="$(
            grep -E '^(WARNING|ERROR)[[:space:]]+-' "$log" \
              | grep -vF 'mkdocs-material language switcher contextual link is not compatible with theme.features = navigation.instant' \
              || true
          )"
          if [[ -n "$unexpected" ]]; then
            echo "Unexpected documentation warnings or errors:"
            echo "$unexpected"
            exit 1
          fi
      - name: Check generated internal links
        run: uv run --locked --group docs python scripts/check_docs_links.py

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0    # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9    # v9.0.0
      - run: uv build
      - run: uvx twine@6.2.0 check dist/*

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0    # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9    # v9.0.0
      - run: uvx ruff@0.15.20 check .

  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0    # v7.0.0
        with:
          persist-credentials: false
      - name: Run gitleaks
        run: |
          version=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks dir . --no-banner --redact
